<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonne Nuit Cousine</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="stars"></div>

    <div class="moon"></div>

    <div class="container">

        <h1> Bonne Nuit </h1>

        <h2>À ma chère cousine </h2>

        <div class="card">

            <p>

                Avant que les étoiles ne veillent sur toi,

                je voulais simplement te souhaiter une très belle nuit.

                Que ton sommeil soit paisible,

                que tes rêves soient remplis de bonheur,

                de réussite et de beaux sourires.

                Passe une excellente nuit.

                À demain 

            </p>

        </div>

    </div>

</body>

</html>
